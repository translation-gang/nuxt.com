features:
  title: Всё необходимое, ничего лишнего
  description: Nuxt управляет архитектурой, чтобы вы могли сосредоточиться на разработке.
  features:
    - icon: i-lucide-sparkles
      title: Без конфигурации
      description: Начните писать код на Vue или TypeScript сразу — Nuxt настроит всё за вас.
    - icon: i-lucide-file-code-2
      title: Режимы рендеринга
      description: Серверный рендеринг, клиентский рендеринг, генерация статического сайта — решайте сами, вплоть до уровня страницы.
    - icon: i-lucide-milestone
      title: Маршрутизация и лейауты
      description: Используйте файловую маршрутизацию для создания сложных представлений с переиспользованием компонентов.
    - icon: i-lucide-unplug
      title: Получение данных
      description: Сделайте компонент Vue асинхронным и получайте данные через await. Nuxt предоставляет мощные композаблы для универсального получения данных.
    - icon: i-lucide-bug
      title: Обработка ошибок
      description: Перехватывайте ошибки с помощью встроенных обработчиков и пользовательских страниц ошибок.
    - icon: i-lucide-flip-horizontal
      title: Переходы
      description: Реализуйте плавные переходы между лейаутами, страницами и компонентами.
    - icon: i-lucide-image
      title: Ресурсы и стили
      description: Воспользуйтесь автоматической оптимизацией изображений, шрифтов и скриптов.
    - icon: i-lucide-file-search
      title: SEO и мета-теги
      description: Создавайте приложения, полностью индексируемые поисковыми системами.
    - icon: i-lucide-puzzle
      title: Модульность
      description: Расширяйте Nuxt с помощью 200+ модулей для быстрой разработки.
    - icon: i-lucide-shield-check
      title: Мидлвар
      description: Защищайте страницы или добавляйте логику (локализация, A/B тесты) перед рендерингом.
    - icon: i-simple-icons-typescript
      title: Типобезопасность с TypeScript
      description: Пишите типобезопасный код с автоматической генерацией типов и tsconfig.json.
  cta:
    title: 'Погрузитесь в Nuxt'
    label: Читать документацию
    to: /docs
    icon: i-lucide-arrow-right
foundation:
  title: Построен на проверенных инструментах
  description: Vue для фронтенда. Nitro для сервера. Выбор сборщика за вами.
  items:
    - id: vue
      title: Фронтенд с Vue.js
      description: Nuxt построен на Vue.js, используя реактивную компонентную архитектуру для создания мощных и масштабируемых веб-приложений.
      logo: i-custom-vue
      color: '#42B883'
      gradient: 'bg-gradient-to-br from-[#42B883]/10 from-5% via-transparent via-50% to-transparent'
      link:
        label: vuejs.org
        to: https://vuejs.org
    - id: bundler
      title: Сборщик Vite
      description: Nuxt использует возможности Vite для быстрой разработки с мгновенным HMR для отличного опыта разработчика.
      logo: i-custom-vite
      color: '#A156FE'
      gradient: 'bg-gradient-to-br from-[#A156FE]/10 from-5% via-transparent via-50% to-transparent'
      link:
        label: vite.dev
        to: https://vite.dev
    - id: bundler
      title: Сборщик Webpack
      description: Nuxt использует мощные возможности Webpack для сборки и оптимизации.
      logo: i-custom-webpack
      color: '#8ED6FB'
      gradient: 'bg-gradient-to-br from-[#8ED6FB]/10 from-5% via-transparent via-50% to-transparent'
      link:
        label: webpack.js.org
        to: https://webpack.js.org
    - id: bundler
      title: Сборщик Rspack
      description: Nuxt интегрирует высокопроизводительную сборку Rspack для быстрых билдов и HMR.
      logo: i-custom-rspack
      color: '#F93920'
      gradient: 'bg-gradient-to-br from-[#F93920]/10 from-5% via-transparent via-50% to-transparent'
      link:
        label: rspack.dev
        to: https://rspack.dev
    - id: nitro
      title: Сервер Nitro
      description: Nuxt использует Nitro как серверный движок для создания универсальных full-stack приложений, готовых к развёртыванию на любой платформе.
      logo: i-custom-nitro
      color: '#FB848E'
      gradient: 'bg-gradient-to-br from-[#FB848E]/10 from-5% via-transparent via-50% to-transparent'
      link:
        label: nitro.build
        to: https://nitro.build
modules:
  title: Расширяйте Nuxt модулями plug & play
  description: У Nuxt богатая экосистема модулей — официальных и от сообщества. Готовые решения ускоряют разработку.
